front:
  text: 太上洞神太元河圖三元仰謝儀序忠十二
  hash: sha256:db7a6dc1733174f3836926c215b12d92ecaa35ea177aaac7c8a22e9d29c3f505
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0202_HFL_000-001a, image: hfl/0565/0565-136.png}
body:
  text: 廣成先生杜光庭修經曰河圖仰謝之法學道之士常能行之度洪災之劫升為種民若兵戈水火旱潦螟蝗星辰變怪天地易常山摧川涸日月簿蝕風霜不時雷電害物妖氣作沴鬼邪惑衆四境不寧猛鷙為暴若帝王國主不安及疾厄災異至於民間危急當告謝天地玄感穹旻乃可解度耳天道憫物玄聖流慈太上出河洛龜龍之書青文緑甲之字以授帝王此蓋教民致福謝過度厄解災之法也行之則上合天道舉無不應矣三元仰謝齊用壬辰癸巳之日戌亥之時戌亥為天門蛇對於樞知變即成龍龍當其機識化即入道戌亥者天門之津塗辰已者龍蛇之樞機也感悟求真必由斯日故用辰巳日也壬者陽氣所生太一之位也故戌亥時升壇告謝子時陽氣通生之首也道法執象導物伏鬼制神御天統人以十二辰為用立德於子表成於丑愼衰於寅戒敗於卯運智慮於辰用消息於巳救傾於午即安於未防亂於申開大於酉歸根於戌太平於玄歸根則隂氣盡太平則陽氣升道運則陽升水柔則道合故壬癸為勝順陽合道故也急有祈謝未及壬辰日者寅以愼衰午以救傾戌以歸根此三辰日時急亦可用合天道矣苟能丹苦感徹必契神明者餘日無爽不拘於此矣未齊三日掃灑內外禁絶庶事約飭僚友惟務精嚴一心營備無忘謹敬也太上洞神太元河圖三元仰謝儀壇堂第一壇堂相近以便法事闊狹豐儉隨處取足賓主房室勿逼堂墠食屋沐室與圊相逺內外區分愼無敞露若住止迫迮嚴加障理新淨帷幔葦薦籧篨斷隔牢密勿使煙臭相參也齊堂中正面設太上位左右經寶師尊及講誦之所屏幃案几香燈爐奩四周舒陳皆令整潔也堂位壇圖柱纂詳見黃籙立成儀壇位太歲本命行年元辰生月胎月遊年三丘五墓九幽宮宅門戶窗床堂房井竈圊溝倉庫園右四十燈隨位安之各列牌榜神位第二神位之設堂於庭中平地作墠方三丈九尺應三升九壘墠外護淨八尺以繩約之四方方然八燈合三十二燈燈高九尺應九玄三十二天次第二墠方二丈四尺應二十四氣四方方然七燈合二十八燈燈髙五尺應五星二十八宿二十八宿中間正四方方然一燈正中央然一燈又夾二燈並高七尺以應七曜又隔七尺即為天心天心方一丈正中央然十燈又安二燈各高七尺應台斗天心前施一案不然香以置大羅之策策左又一案然一香策右又一案然四香策之四方各一案然一香墠外正神九十一燈各高五尺太一十二辰二十四氣太歲本命行年元辰生月胎月遊年三丘五墓九幽合六十一燈宮宅門戶窗床堂房井竈圊溝倉庫園各二燈合三十燈凡一百七十燈策用槿柏香材竹等長一尺二寸廣四寸四分厚三分符板亦然皆長九寸闊一寸八分厚二分竅其上端𢇁繩穿之或懸或閣隨便而用符板六十四枚燈牌二百三枚各長七寸闊一寸辱二分懸之策一枚六十神板亦如之夫燈以釋暗增明捨隂就陽凡用薦席三周其外步障禁隔悉取精足也所用之物力可堪者悉須置之堪而不置是獲吝財慢法之罪怠惰之謫雖小不原立功務德勇猛為上又不得牽引非巳之物及强乞逼借有忤神明其咎不赦謹而精備者福降無涯自下升高階賤成貴積微至著鍊僞入真解身中宿根二十八結度陽九百六之災通究上玄保長生之樂帝王修之可以神明通感隂陽交泰國安民和無三災水火兵疫之憂矣得不勉哉門用長纂八枚門檐四枚釘鈕懸榜門間短纂二十枚朱繩六十四尺紵芒為之門榜四枚廣六寸長五寸覆翼相稱西北亥天門玄書白上東南巳地戶黃書朱上西南申月門白書朱上東北寅日門朱書黑上甲子王文卿乙丑龍季卿丙寅張仲卿丁卯司馬卿戊辰季楚卿己巳何文昌庚午馮仲卿辛未王文章壬申矦博卿癸酉孫仲房甲戌展子江乙亥龐明公巳上十二神列於北方始於亥訖於丑丙子邢孫卿丁丑趙子玉戊寅虞子卿己卯石文陽庚辰尹佳卿辛巳陽仲公壬午馬子明癸未吕威明甲申扈文長乙酉孔利公丙戌車元升丁亥張文通巳上十二神列於東方始於寅訖於辰戊子樂石陽己丑范和卿庚寅禇進卿辛卯郭子良壬辰武雅卿癸巳史公來甲午衛上卿乙未杜仲陽丙申朱伯衆丁酉臧文公戊戌范少卿己亥鄧都卿已上十二神列於南方始於巳記於未庚子陽仲叔辛丑林衛公壬寅丘孟卿癸卯蘇他家甲辰孟非卿乙巳唐文卿丙午魏文公丁未石叔通戊申范伯陽己酉成文長庚戌史子仁辛亥左子行已上十二神列於西方始於申訖於戌壬子宿上卿癸丑江漢卿甲寅明文章乙卯戴公陽丙辰霍叔英丁巳崔巨卿戊午從元光己未時通卿庚申華文陽辛酉邴元玉壬戌樂進卿癸亥左石松巳上十二神列於中央繞方文之外四邊各三始於申訖於未右六甲直符姓名各懸所屬之燈書版策依次書符題天如左太皇黃㑹天從官九億萬人太明玉完天從官九億萬人清明河童天從官九億萬人玄胎平育天從官九億萬人元明文舉天從官九億萬人上明七曜摩夷天官九億萬人虛無越衡天從官九億萬人太極濛翳天從官九億萬人右八天位屬東方八符朱書青氣生文他倣此八直符黑書赤明和陽天從官九億萬人玄明恭華天從官五億萬人耀明宗飄天從官五億萬人竺落皇笳天從官十五億萬人虛明堂曜天從官九億萬人觀明端靜天從官十二億萬人玄明恭慶天從官十七億萬人太煥極瑶天從官十八億萬人右八天位屬南方八符黃素朱書八直符黑書元載孔升天從官十八億萬人太安皇崖天從官七億萬人顯定極風天從官十五億萬人始皇孝芒天從官四億萬人太皇翁重浮容天從官七億萬人無思江由天從官七億萬人上揲阮樂天從官七億萬人無極曇誓天從官七億萬人右八天位屬西方八符黑地白書八直符黑書皓庭霄度天從官五億萬人淵通元洞天從官五億萬人太文翰寵妙成天從官五億萬人太素秀樂禁上天從官五億萬人太虛無上常融天從官五億萬人太釋玉隆騰勝天從官五億萬人龍變梵度天從官五億萬人太極平育賈奕天從官五億萬人右八天位屬北方八符青地黑書八直符黑書大羅策文太上無極至真無上無為大道應感真精大羅梵氣虛皇玉靈百八十道君無極世界天師至尊道德衆真巳得道無量大聖衆此四十九字紫書右一策版竹隨時安南方首北正中别案檠及香此名鎮策細書取容題簡策法皆應朱書忽急促無朱用墨鎮䇿紫書取通皇極無象見則吉昌相生制用內外和同各有其趣愼勿悮換之書天畫符章次題燈如左角二亢四氐四房四心三尾九箕四巳上東方七宿始辰記寅斗六牛六女四虛三危三室二璧二巳上北方七宿始丑訖亥奎六婁三冒三昴七畢八觜三參十巳上西方七宿始戌訖申井八鬼五柳八星七張六翼二十二軫四巳上南方七宿始未訖巳右二十八宿各懸所屬之燈日寅卯之間月酉戌之間歲星卯熒惑星午太白星酉辰星子鎮星中右七曜各懸所屬之燈陽明一隂精二真人三玄冥四丹元五北極六天關七輔星八弼星九右北斗九星各各懸所屬之燈上台虛精中台六淳下台曲生北斗九星與此三台十二燈列於正中懸䇿居纂之半鑽繩令堅鎮星附之太一壇北正中十二辰齊所四方二十四氣太一之北太歲隨歲所在本命家主一人行年同上元辰生月胎月遊年皆以家主一人年命三丘丑上五墓姓墓九幽合六十一燈宮屋之正中宅所居正中門戶窗有紗錢者床蕩關正中堂內前外前房側廂內外井竈圊溝倉六燈在東庫北方園合三十燈并前九十一燈園燈隨所在無或逺者置門外之東凡十五名各二燈無亦勿關右列燈符東向存思請願等法甲寅丙寅戊寅庚寅壬寅巳上列東方之北乙卯丁卯巳卯辛卯癸卯巳上列東方之中丙辰戊辰庚辰壬辰甲辰巳上列東方之南丁巳己巳辛巳癸巳乙巳巳上列南方之東戊午庚午壬午甲午丙午巳上列南方之中己未辛未癸未乙未丁未巳上列南方之西庚申壬申甲申丙申戊申巳上列西方之南辛酉癸酉乙酉丁酉己酉巳上列西方之中壬戌甲戌丙戌戊戌庚戌巳上列西方之北癸亥乙亥丁亥己亥辛玄巳上列北方之西甲子丙子戊子庚子壬子巳上列北方之中乙丑丁丑巳丑辛丑癸丑巳上列北方之東右六甲各五位同所諦識却邪勿妄求正姓名如前簡書之此為北向存請之法凡燈版符簡采色裝畫每令膠固雖風雨亦不可收以至竟事或有損汙告真而修之切在嚴淨可以致福風雨𣊻至遷燈巵南第一太黃皇㑹天從官九億萬人南第二太明玉完天從官十六億萬人南第三清明何童天從官十七億萬人南第四玄胎平育天從官十億萬人南第五元明文舉天從官十一億萬人南第六上明七曜摩夷天從官八億萬人南第七虛無越衡天從官二十六億萬人右北方七宿黑地白書符取生氣他倣此天及䜟丹書西第一太極濛翳天從官十一億萬人西第二赤明和陽天從官十八億萬人西第三玄明宗飄天從官五億萬人西第四曜明宗飄天從官五億萬人西第五竺落皇笳天從官十五億萬人西第六虛明堂曜天從官九億萬人西第七觀明端靜天從官十二億萬人右東方七宿青地黑書符天及䜟丹書北第一玄明恭慶天從官十七億萬人北第二太煥極瑶天從官十八億萬人北第三元載孔升天從官十八億萬人北第四太安皇崖天從官七億萬人北第五顯定極風天從官十五億萬人北第六始皇孝芒天從官四億萬人北第七太皇翁重浮容天從官四十三億萬人右南方七宿赤地青書符天及䜟丹書東第一無思江由天從官九億萬人東第二上揲阮樂天從官三億萬人東第三無極曇誓天從官十六億萬人東第四皓庭霄度天從官十六億萬人東第五淵通元洞天從官十四億萬人東第六太文翰寵妙成天從官十二億萬人東第七太素秀樂禁上天從官十六億萬人右西方七宿白地黃書符天及䜟丹書太虛無上常融天從官八十億萬人右西南方黃地朱書符天及䜟丹書太釋玉隆騰勝天從官八十億萬人右東北方朱地青書符天及䜟丹書龍變梵度天從官八十億萬人右東南方黃地白書符天及䜟丹書太極平育賈奕天從官八十億萬人右西北方玄地黃書符天及䜟丹書諸天之氣凝為星辰結為山嶽天星通應以掌人倫故河圖龍文演之以示於世世人知而修之可以解災致福耳始乎北者拜宿為端心注天路逆歷星官依度環回期逢玄祐凡拜四維各十二拜大羅策及符版燈簡諸天位號與東向法並同所書簡畫符悉當春東夏南秋西冬北向王潔淨燒香書之書訖當懸策之前師盥漱向王臨目握固存神列符簡於案上叩齒三十二通咽液三十二過敕符呪曰下遊上升九玄祐黃奕始通神氣䨱事竟收符策存神如前又呪曰若風雷之變公私之急暫收符䇿不須敕呪行善守玄魂魄正三天降福九君令策中從官人數變化隨時春十夏百秋千冬萬四季同億五化周遍自天子至于庶人可通用億數為勝其數東九南三西七北五此為氣數子庚丑辛值七為金寅戊卯已得三為火此五行之氣數也故東方九氣青天矣修此齊者經云一者存思定心業也二者祝願習口業也三者拜禮攺身業也以善易惡惟在至誠三業既悛百福斯至可不務哉方壇或墠使外方五十五尺應羅天大衍之數纂高丈二門廣五尺散纂九尺門榜書處地方三寸三分四方及中施六十燈各髙六尺大約燈可用二百三十若地狹力貧促令至少亦須三十二枚不可減矣詳擇吉辰肅備法物招結道友延請高流皆須澡浴鮮潔衣裳至齊所前三日却葷汚斷外事一心清淨以俟修奉雜役之者不得多人多
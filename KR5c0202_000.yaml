冤仇或陽景隂關猶逢債訟或巳身所犯或先逺殃流無量無邊不可憶識臣等擢質太陽處身道運得以塵穢參奉洞真三洞金書九天玉笈鍊景胎元之妙凝神抱一之規鳯氣龍圖迥年駐景朝元復命證聖超凡歷代所傳萬年所寶師資開悟咸得窺臨地耳庸襟值天章之宛奧蜉蝣朝菌識椿壽之延洪餐味至音踊躍忘倦必謂九清三境有朝拜之期日闕星津有超騰之望而昏愚積習識性易迷淪溺罪河漂沈穢海耽染聲利留滯繁華捨正徇邪搆造諸惡或輕侮聖典疑毀真靈或竊盜神書傳授非道或規逐財色貪冒浮榮外假清虛內虧真正或依託三寶營已奉私受人崇施不修功德侵欺常住誣誷神明或詐識星文干知凶吉自作一法隳背典常日積月深永不知覺或內乖存注外闕秉修瀆亂三宮昏醫八景赤子有淪胥之痛丹田有蒙塞之悲六氣失和百關或壅是以愆能招禍德可消災而怨道不慈疑神不祐捨本逐末會未懴除渺渺生津追望何及至有崇修城闕制創池隍經行官任卜宅相居土木興工幽明觸犯或侵傷土府或摧壤丘墳或殘毀神墟暴害靈跡穿鑿福地涸竭泉源穢汚江河反違天地或前生纍世輪轉受身億劫以來莫知終始或會居尊位無道無慈或為人臣子不忠不孝或殘害物命以養已身或故殺誤傷恣為罪犯或因行討伐憑公挾私玉石俱焚會無惻隱賢愚齊殞豈有矜嗟致使蠢類無依人鬼咸痛以兹前過流逮此身或九祖七玄先亡眷屬幽冥負責延纍子孫或墳壠不寧魂神悲怨困為注訟亦致凶衰況乾坤有刑德之神天地有司察之吏隂陽有繩非之目曹僚有主過之官善惡必書纎毫不漏一失壽域永陷罪庭萬劫不還良可悲念又常情之內暗惑者多見為善者致災即謂修善無益不知前世之餘殃未盡殃盡則福來見為惡者安寧即謂為惡無損不知前世之餘福未盡福盡即禍隨遂得逞肆胸襟縱橫任意沈於冥夜衆苦備嬰自非大道流光永乖生路伏聞玄經垂訓開首悔之門一旬精修則太清却其一刻二時不懈則上清録其善功三年啓叩則玉清除其衆罪諸天憫世萬聖延恩委曲誘其迷津丁寧示其溺喪躍龍魚以緑圖朱字現龜馬以玄檢青文出謝災遷善之書著度世修生之䚿證之則常樂體之則成真隆善貸之仁弘無盡之祚勤行克念必果安全皇帝仰緣河洛品文玄元聖旨歸依稽首懴罪希恩普三界以虔祈遍諸天而悔謝華燈散景遐象星關香霧騰芬佇通雲路敷真文寶懴列璇極瑶樞布款披心冀回真鑒上願二儀寧晏三景昭融緯候循常風雨時順宗桃先聖社稷尊靈承祐無涯與天共永玄黃分次無乘凌孛蝕之災海嶽封疆無水旱兵蝗之變三邊澄靜兆庶歡康賊子姦臣悛心革面夷蠻戎狄航海梯山帝壽延長卜年悠久聖賢佐理忠孝推誠武偃文興天清地靜臣弟子某官等明誠上逹祈向感通天錫休祥神資禎貺宿冤蕩釋債訟和平萬惡雲收千災氷泮幽隂受福玄祖生天恆居道中常與福㑹不逢魔惡不墮邊夷水火無侵刀兵不害常善救物立功佐時舉世太平咸歸道化心神朗慧壽命延長五帝四司三官九府天關地域水陸冥曹泰山酆都九幽泉曲落除罪簡著上生名三業障消十惡根淨死生受貺幽顯蒙恩今故燒香歸身歸神歸命大道伏地首悔一切罪尤伏願大羅虛皇無極上聖三尊三寶道德至尊三十九真三十二帝日月星宿台斗真官六甲五行諸天諸地一切尊聖得道神仙賜敕告幽明內外寮屬監天司過司命高真察皇帝臣等攺往之誠奬皇帝臣等自新之志無邊之釁並賜蕩除法籙吏兵直符神佐鑒領謄奏立冀感通如願之辰仰荷天尊弘慈之澤副皇帝臣等歸命之誠謹啓以聞次十大念臣等一念天地交泰二念日月齊明三念隂陽順序四念國土安寧五念帝王景祚六念宰輔忠貞七念萬姓歡樂八念九榖豐盈九念幽途離苦十念大道興行復爐第九香官使者侍直衆真五帝直符諸天司察臣等奉為皇帝燒香朝謝事訖上願大羅三十二天天帝直符百八十道君直事三十九真使者三元百二十曹職司與今歲月日時將吏七矅五行上下中央四面土地里域真官正神三界內外一切靈司同記皇帝臣等自新之誓諦納請願之誠使嘉氣榮光照耀神州壇場之內三元五帝呈瑞宮闕齊靜之中龍馬負圖龜魚表貺朱綈再出緑字重新皇帝道德昭彰玄功遐被祚曆延永率土太平臣及弟子等衆罪蠲消萬善臻集普天受福幽顯沾恩九祖三師克升真果侍香侍燈玉童玉女三界官屬應感神明奏臣所啓徑御大羅虗皇玉帝御前次學仙引出次巡中燈出地戶繞三光巡天一周至地戶次出戶呪曰六方降真九天垂祐善神相親功德成就畢叩齒咽液各三十二遍次出還齊所太上洞神太元河圖三元仰謝儀
